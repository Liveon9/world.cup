<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>توقعات كأس العالم</title>
<style>
  :root{
    --bg:#0b0d12;
    --panel:#161a22;
    --panel-2:#1d2230;
    --line:#2a3142;
    --gold:#d4af37;
    --gold-soft:#7a6a2c;
    --text:#eef1f7;
    --muted:#8993a8;
    --green:#2fae6b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:radial-gradient(1200px 800px at 50% -10%, #131722 0%, var(--bg) 60%);
    color:var(--text);
    font-family:"Tahoma","Segoe UI",sans-serif;
    min-height:100vh;
    padding-bottom:60px;
  }
  header{
    text-align:center;
    padding:28px 16px 10px;
  }
  header h1{
    font-size:1.5rem;
    margin:0 0 6px;
    letter-spacing:.5px;
  }
  header p{
    color:var(--muted);
    margin:0;
    font-size:.85rem;
  }

  .name-bar{
    max-width:480px;
    margin:18px auto 8px;
    padding:14px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    display:flex;
    gap:8px;
    align-items:center;
  }
  .name-bar input{
    flex:1;
    background:var(--panel-2);
    border:1px solid var(--line);
    border-radius:10px;
    padding:10px 12px;
    color:var(--text);
    font-size:.95rem;
    font-family:inherit;
  }
  .name-bar input::placeholder{color:var(--muted);}
  .name-bar button{
    background:var(--gold);
    color:#1a1405;
    border:none;
    border-radius:10px;
    padding:10px 16px;
    font-weight:bold;
    cursor:pointer;
    font-size:.9rem;
    white-space:nowrap;
    font-family:inherit;
  }
  .name-bar button:disabled{opacity:.5; cursor:not-allowed;}
  .status-line{
    text-align:center;
    font-size:.8rem;
    color:var(--muted);
    min-height:18px;
    margin-bottom:6px;
  }
  .status-line.ok{color:var(--green);}

  .progress-wrap{
    max-width:480px;
    margin:0 auto 20px;
    padding:0 14px;
  }
  .progress-track{
    height:6px;
    background:var(--panel-2);
    border-radius:6px;
    overflow:hidden;
  }
  .progress-fill{
    height:100%;
    background:linear-gradient(90deg,var(--gold-soft),var(--gold));
    width:0%;
    transition:width .3s ease;
  }
  .progress-label{
    text-align:center;
    font-size:.75rem;
    color:var(--muted);
    margin-top:4px;
  }

  .round-stage{
    max-width:480px;
    margin:0 auto;
    padding:0 14px;
  }
  .round-title{
    text-align:center;
    color:var(--gold);
    font-size:1.05rem;
    font-weight:bold;
    margin:10px 0 14px;
  }
  .round-sub{
    text-align:center;
    color:var(--muted);
    font-size:.78rem;
    margin:-8px 0 16px;
  }

  .match{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:10px;
    margin-bottom:14px;
  }
  .match-label{
    font-size:.72rem;
    color:var(--muted);
    text-align:center;
    margin-bottom:8px;
  }
  .team-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 12px;
    border-radius:10px;
    background:var(--panel-2);
    margin-bottom:6px;
    cursor:pointer;
    border:2px solid transparent;
    transition:all .15s ease;
    font-size:.95rem;
    font-weight:600;
  }
  .team-row:last-child{margin-bottom:0;}
  .team-row:active{transform:scale(.98);}
  .team-row .flag{font-size:1.5rem; line-height:1;}
  .team-row.selected{
    border-color:var(--gold);
    background:#2a2410;
  }
  .team-row.selected::after{
    content:"✓";
    margin-right:auto;
    color:var(--gold);
    font-weight:bold;
  }
  .team-row.empty{
    color:var(--muted);
    cursor:default;
    font-style:italic;
    font-size:.85rem;
  }

  .nav-buttons{
    display:flex;
    justify-content:space-between;
    max-width:480px;
    margin:18px auto;
    padding:0 14px;
    gap:10px;
  }
  .nav-buttons button{
    flex:1;
    background:var(--panel-2);
    border:1px solid var(--line);
    color:var(--text);
    padding:12px;
    border-radius:10px;
    font-size:.9rem;
    cursor:pointer;
    font-family:inherit;
  }
  .nav-buttons button:disabled{opacity:.35; cursor:not-allowed;}
  .nav-buttons button.primary{
    background:var(--gold);
    color:#1a1405;
    font-weight:bold;
    border:none;
  }

  .reset-row{
    text-align:center;
    margin-top:6px;
  }
  .reset-row button{
    background:none;
    border:none;
    color:var(--muted);
    text-decoration:underline;
    font-size:.78rem;
    cursor:pointer;
    font-family:inherit;
  }

  .divider{
    max-width:480px;
    margin:36px auto 18px;
    padding:0 14px;
    display:flex;
    align-items:center;
    gap:10px;
    color:var(--muted);
    font-size:.85rem;
  }
  .divider::before,.divider::after{
    content:"";
    flex:1;
    height:1px;
    background:var(--line);
  }

  .board{
    max-width:600px;
    margin:0 auto;
    padding:0 14px;
  }
  .board-title{
    text-align:center;
    font-size:1.15rem;
    color:var(--gold);
    font-weight:bold;
    margin-bottom:14px;
  }
  .pred-card{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    margin-bottom:10px;
  }
  .pred-card .who{
    font-weight:bold;
    font-size:1rem;
    margin-bottom:8px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .pred-card .who .crown{color:var(--gold);}
  .pred-final{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    font-size:1.05rem;
    font-weight:bold;
    background:var(--panel-2);
    border-radius:10px;
    padding:10px;
    margin-bottom:8px;
  }
  .pred-final .flag{font-size:1.6rem;}
  .pred-meta{
    font-size:.75rem;
    color:var(--muted);
    text-align:center;
  }
  .empty-board{
    text-align:center;
    color:var(--muted);
    padding:30px 10px;
    font-size:.9rem;
  }

  .loading{
    text-align:center;
    color:var(--muted);
    padding:40px;
  }

  .setup-box{
    max-width:480px;
    margin:18px auto;
    padding:16px;
    background:var(--panel);
    border:1px solid var(--gold-soft);
    border-radius:14px;
    font-size:.85rem;
    line-height:1.7;
  }
  .setup-box h3{
    margin:0 0 8px;
    color:var(--gold);
    font-size:.95rem;
  }
  .setup-box code{
    background:var(--panel-2);
    padding:2px 6px;
    border-radius:6px;
    font-size:.8rem;
    word-break:break-all;
    display:inline-block;
    margin:4px 0;
  }
  .setup-box button{
    background:var(--gold);
    color:#1a1405;
    border:none;
    border-radius:10px;
    padding:10px 14px;
    font-weight:bold;
    cursor:pointer;
    font-size:.85rem;
    width:100%;
    margin-top:8px;
    font-family:inherit;
  }
  .setup-box button:disabled{opacity:.5;}
  .setup-box .ok-msg{color:var(--green); font-weight:bold;}
</style>
</head>
<body>

<header>
  <h1>🏆 توقعاتي لكأس العالم</h1>
  <p>اختر اسمك، ثم اضغط على المنتخب المتوقع فوزه في كل مباراة</p>
</header>

<div class="name-bar">
  <input type="text" id="nameInput" placeholder="اكتب اسمك هنا..." maxlength="30">
  <button id="startBtn">بدء التوقع</button>
</div>
<div class="status-line" id="statusLine"></div>

<div id="appArea"></div>

<div class="divider">📋 توقعات الجميع</div>
<div id="setupArea"></div>
<div class="board" id="board">
  <div class="loading">جاري التحميل...</div>
</div>

<script>
// ---------- Bracket data (32 teams, based on the uploaded image) ----------
const flags = {
  "البرازيل":"🇧🇷","اليابان":"🇯🇵","ساحل العاج":"🇨🇮","النرويج":"🇳🇴",
  "المكسيك":"🇲🇽","الإكوادور":"🇪🇨","إنجلترا":"🏴","الكونغو الديمقراطية":"🇨🇩",
  "الأرجنتين":"🇦🇷","الرأس الأخضر":"🇨🇻","أستراليا":"🇦🇺","مصر":"🇪🇬",
  "سويسرا":"🇨🇭","الجزائر":"🇩🇿","كولومبيا":"🇨🇴","غانا":"🇬🇭",
  "ألمانيا":"🇩🇪","باراغواي":"🇵🇾","فرنسا":"🇫🇷","السويد":"🇸🇪",
  "جنوب أفريقيا":"🇿🇦","كندا":"🇨🇦","هولندا":"🇳🇱","المغرب":"🇲🇦",
  "البرتغال":"🇵🇹","كرواتيا":"🇭🇷","إسبانيا":"🇪🇸","النمسا":"🇦🇹",
  "الولايات المتحدة":"🇺🇸","البوسنة والهرسك":"🇧🇦","بلجيكا":"🇧🇪","السنغال":"🇸🇳"
};

// Round of 32 matchups, in bracket order (left side then right side)
const round32 = [
  ["البرازيل","اليابان"],
  ["ساحل العاج","النرويج"],
  ["المكسيك","الإكوادور"],
  ["إنجلترا","الكونغو الديمقراطية"],
  ["الأرجنتين","الرأس الأخضر"],
  ["أستراليا","مصر"],
  ["سويسرا","الجزائر"],
  ["كولومبيا","غانا"],
  ["ألمانيا","باراغواي"],
  ["فرنسا","السويد"],
  ["جنوب أفريقيا","كندا"],
  ["هولندا","المغرب"],
  ["البرتغال","كرواتيا"],
  ["إسبانيا","النمسا"],
  ["الولايات المتحدة","البوسنة والهرسك"],
  ["بلجيكا","السنغال"]
];

// Rounds config: id, title, number of matches, subtitle
const rounds = [
  {id:"r32", title:"دور الـ 32", count:16},
  {id:"r16", title:"دور الـ 16", count:8},
  {id:"qf",  title:"ربع النهائي", count:4},
  {id:"sf",  title:"نصف النهائي", count:2},
  {id:"third", title:"مباراة المركز الثالث", count:1, sub:"بين الخاسرين في نصف النهائي"},
  {id:"final", title:"النهائي", count:1}
];

// ---------- State ----------
let currentUser = null;
let currentRoundIndex = 0;
// picks structure: { r32:[w1,w2,...16], r16:[...8], qf:[...4], sf:[...2], third:[w], final:[w] }
let picks = {r32:Array(16).fill(null), r16:Array(8).fill(null), qf:Array(4).fill(null), sf:Array(2).fill(null), third:Array(1).fill(null), final:Array(1).fill(null)};

// ---------- Shared storage (jsonblob.com) ----------
// إذا ظهر مربع "ربط التخزين" بالأسفل، اضغط الزر مرة واحدة فقط لإنشاء مكان تخزين مشترك،
// ثم استبدل قيمة BLOB_ID في هذا الملف بالمعرّف الذي يظهر لك، واحفظ الملف.
// بعد ذلك التخزين سيعمل تلقائياً لكل من يفتح هذا الملف (بدون الحاجة لتكرار هذه الخطوة).
const BLOB_ID = ""; // <-- ضع هنا الـ blobId بعد إنشائه (مثال: "5226571730043f8b22dadc20")
const JSONBLOB_BASE = "https://jsonblob.com/api/jsonBlob";

function getEffectiveBlobId(){
  if(BLOB_ID && BLOB_ID.trim()) return BLOB_ID.trim();
  // fallback: locally cached blob id (only works on this same browser)
  return localStorage.getItem("wc_blob_id") || "";
}

async function createNewBlob(){
  const res = await fetch(JSONBLOB_BASE, {
    method: "POST",
    headers: {"Content-Type":"application/json","Accept":"application/json"},
    body: JSON.stringify({predictions:{}})
  });
  if(!res.ok) throw new Error("فشل إنشاء التخزين");
  const location = res.headers.get("Location");
  let newId = null;
  if(location){
    newId = location.split("/").pop();
  }
  if(!newId){
    // some browsers block reading Location header on cross-origin; fallback: ask user to check network tab
    throw new Error("تم الإنشاء لكن تعذّر قراءة المعرّف تلقائياً");
  }
  localStorage.setItem("wc_blob_id", newId);
  return newId;
}

async function fetchAllPredictions(){
  const id = getEffectiveBlobId();
  if(!id) return {predictions:{}, missingBlob:true};
  const res = await fetch(`${JSONBLOB_BASE}/${id}`, {
    headers:{"Accept":"application/json"}
  });
  if(!res.ok) throw new Error("فشل تحميل البيانات");
  const data = await res.json();
  if(!data.predictions) data.predictions = {};
  return data;
}

async function saveAllPredictions(fullData){
  const id = getEffectiveBlobId();
  if(!id) throw new Error("لا يوجد تخزين مرتبط بعد");
  const res = await fetch(`${JSONBLOB_BASE}/${id}`, {
    method:"PUT",
    headers:{"Content-Type":"application/json","Accept":"application/json"},
    body: JSON.stringify(fullData)
  });
  if(!res.ok) throw new Error("فشل الحفظ");
  return await res.json();
}

const appArea = document.getElementById("appArea");
const statusLine = document.getElementById("statusLine");
const nameInput = document.getElementById("nameInput");
const startBtn = document.getElementById("startBtn");

function flagSpan(team){
  return `<span class="flag">${flags[team]||"🏳️"}</span>`;
}

function getMatchTeams(roundId, matchIndex){
  if(roundId === "r32") return round32[matchIndex];
  if(roundId === "r16") return [picks.r32[matchIndex*2], picks.r32[matchIndex*2+1]];
  if(roundId === "qf") return [picks.r16[matchIndex*2], picks.r16[matchIndex*2+1]];
  if(roundId === "sf") return [picks.qf[matchIndex*2], picks.qf[matchIndex*2+1]];
  if(roundId === "third"){
    // losers of the two semifinal matches
    const sf1 = [picks.qf[0], picks.qf[1]];
    const sf2 = [picks.qf[2], picks.qf[3]];
    const loser1 = picks.sf[0] ? sf1.find(t=>t && t!==picks.sf[0]) : null;
    const loser2 = picks.sf[1] ? sf2.find(t=>t && t!==picks.sf[1]) : null;
    return [loser1, loser2];
  }
  if(roundId === "final") return [picks.sf[0], picks.sf[1]];
}

function clearDownstream(fromRoundIdx){
  // when a pick changes, clear all picks in later rounds
  for(let i=fromRoundIdx+1;i<rounds.length;i++){
    const r = rounds[i];
    picks[r.id] = Array(r.count).fill(null);
  }
}

function renderRound(){
  const r = rounds[currentRoundIndex];
  let html = `<div class="round-stage">`;
  html += `<div class="round-title">${r.title}</div>`;
  if(r.sub) html += `<div class="round-sub">${r.sub}</div>`;

  for(let m=0;m<r.count;m++){
    const teams = getMatchTeams(r.id, m);
    const selected = picks[r.id][m];
    html += `<div class="match">`;
    if(r.count>1) html += `<div class="match-label">مباراة ${m+1}</div>`;
    teams.forEach(team=>{
      if(!team){
        html += `<div class="team-row empty">في انتظار نتيجة الجولة السابقة...</div>`;
      } else {
        const isSel = selected === team;
        html += `<div class="team-row ${isSel?'selected':''}" data-round="${r.id}" data-match="${m}" data-team="${team}">
          ${flagSpan(team)}<span>${team}</span>
        </div>`;
      }
    });
    html += `</div>`;
  }
  html += `</div>`;

  // nav buttons
  const allFilled = picks[r.id].every(p=>p!==null);
  html += `<div class="nav-buttons">
    <button id="prevBtn" ${currentRoundIndex===0?'disabled':''}>⟵ السابق</button>
    <button id="nextBtn" class="primary" ${(!allFilled || currentRoundIndex===rounds.length-1)?'disabled':''}>التالي ⟶</button>
  </div>`;

  if(currentRoundIndex===rounds.length-1){
    html += `<div class="nav-buttons" style="margin-top:-8px;">
      <button id="saveBtn" class="primary" style="flex:1;" ${!allFilled?'disabled':''}>💾 حفظ توقعي</button>
    </div>`;
  }

  html += `<div class="reset-row"><button id="resetBtn">إعادة ضبط توقعي بالكامل</button></div>`;

  // progress
  const totalMatches = rounds.reduce((a,r)=>a+r.count,0);
  let doneMatches = 0;
  rounds.forEach(r=>{ doneMatches += picks[r.id].filter(p=>p!==null).length; });
  const pct = Math.round((doneMatches/totalMatches)*100);

  document.querySelector(".progress-fill") && (document.querySelector(".progress-fill").style.width = pct+"%");

  appArea.innerHTML = `
    <div class="progress-wrap">
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div class="progress-label">${doneMatches} من ${totalMatches} مباراة • الجولة ${currentRoundIndex+1} من ${rounds.length}</div>
    </div>
    ${html}
  `;

  // attach events
  appArea.querySelectorAll(".team-row[data-team]").forEach(el=>{
    el.addEventListener("click", ()=>{
      const rid = el.dataset.round;
      const mi = parseInt(el.dataset.match);
      const team = el.dataset.team;
      picks[rid][mi] = team;
      clearDownstream(currentRoundIndex);
      renderRound();
    });
  });
  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");
  const resetBtn = document.getElementById("resetBtn");
  const saveBtn = document.getElementById("saveBtn");
  if(prevBtn) prevBtn.addEventListener("click", ()=>{ currentRoundIndex--; renderRound(); });
  if(nextBtn) nextBtn.addEventListener("click", ()=>{ currentRoundIndex++; renderRound(); });
  if(resetBtn) resetBtn.addEventListener("click", ()=>{
    if(confirm("هل تريد إعادة ضبط جميع توقعاتك؟")){
      picks = {r32:Array(16).fill(null), r16:Array(8).fill(null), qf:Array(4).fill(null), sf:Array(2).fill(null), third:Array(1).fill(null), final:Array(1).fill(null)};
      currentRoundIndex = 0;
      renderRound();
    }
  });
  if(saveBtn) saveBtn.addEventListener("click", savePrediction);
}

async function savePrediction(){
  if(!currentUser) return;
  statusLine.textContent = "جاري الحفظ...";
  statusLine.className = "status-line";
  try{
    if(!getEffectiveBlobId()){
      statusLine.textContent = "لم يتم ربط التخزين المشترك بعد، انظر الصندوق بالأسفل ⬇️";
      return;
    }
    // read-modify-write to avoid wiping out other users' predictions
    const all = await fetchAllPredictions();
    all.predictions[currentUser.trim()] = {
      name: currentUser.trim(),
      picks: JSON.parse(JSON.stringify(picks)),
      savedAt: new Date().toISOString()
    };
    await saveAllPredictions(all);
    statusLine.textContent = "✅ تم حفظ توقعك بنجاح، ويظهر الآن للجميع!";
    statusLine.className = "status-line ok";
    await loadBoard();
  }catch(e){
    console.error(e);
    statusLine.textContent = "حدث خطأ أثناء الحفظ، حاول مرة أخرى.";
  }
}

startBtn.addEventListener("click", async ()=>{
  const name = nameInput.value.trim();
  if(!name){
    statusLine.textContent = "اكتب اسمك أولاً 🙂";
    statusLine.className = "status-line";
    return;
  }
  currentUser = name;
  startBtn.disabled = true;
  nameInput.disabled = true;
  statusLine.textContent = "جاري تحميل توقعك السابق (إن وجد)...";

  // try load existing prediction for this name
  try{
    if(getEffectiveBlobId()){
      const all = await fetchAllPredictions();
      const existing = all.predictions[name];
      if(existing && existing.picks){
        picks = existing.picks;
        statusLine.textContent = "تم تحميل توقعك المحفوظ مسبقاً ✏️";
        statusLine.className = "status-line ok";
      } else {
        statusLine.textContent = "ابدأ باختيار الفرق الفائزة 👇";
      }
    } else {
      statusLine.textContent = "ابدأ باختيار الفرق الفائزة 👇 (التخزين المشترك غير مربوط بعد، انظر الأسفل)";
    }
  }catch(e){
    statusLine.textContent = "ابدأ باختيار الفرق الفائزة 👇";
  }

  document.querySelector(".name-bar").style.display = "none";
  currentRoundIndex = 0;
  renderRound();
});

nameInput.addEventListener("keydown", (e)=>{
  if(e.key === "Enter") startBtn.click();
});

// ---------- One-time storage setup ----------
function renderSetupArea(){
  const setupArea = document.getElementById("setupArea");
  if(getEffectiveBlobId()){
    setupArea.innerHTML = "";
    return;
  }
  setupArea.innerHTML = `
    <div class="setup-box">
      <h3>🔧 ربط التخزين المشترك (مرة واحدة فقط)</h3>
      <p>هذه الصفحة تحتاج مكان تخزين واحد يشاركه الجميع. اضغط الزر بالأسفل لإنشائه (يتم مرة واحدة فقط من أي جهاز):</p>
      <button id="createBlobBtn">إنشاء مكان التخزين الآن</button>
      <div id="setupResult" style="margin-top:10px;"></div>
    </div>
  `;
  document.getElementById("createBlobBtn").addEventListener("click", async ()=>{
    const btn = document.getElementById("createBlobBtn");
    const resultBox = document.getElementById("setupResult");
    btn.disabled = true;
    resultBox.innerHTML = "جاري الإنشاء...";
    try{
      const id = await createNewBlob();
      resultBox.innerHTML = `
        <div class="ok-msg">✅ تم الإنشاء بنجاح!</div>
        <p>لتفعيله بشكل دائم لكل من يفتح الملف، افتح ملف الصفحة وابحث عن السطر:<br>
        <code>const BLOB_ID = "";</code><br>
        واستبدله بـ:<br>
        <code>const BLOB_ID = "${id}";</code><br>
        ثم احفظ الملف. (إلى أن تسوي هذا، التخزين سيعمل بهذا المتصفح فقط لأنه محفوظ محلياً).</p>
      `;
      loadBoard();
    }catch(e){
      console.error(e);
      resultBox.innerHTML = `<span style="color:#e15a5a;">حدث خطأ: ${e.message}. حاول مرة أخرى.</span>`;
      btn.disabled = false;
    }
  });
}

// ---------- Shared board of everyone's predictions ----------
async function loadBoard(){
  renderSetupArea();
  const board = document.getElementById("board");
  board.innerHTML = `<div class="loading">جاري التحميل...</div>`;
  if(!getEffectiveBlobId()){
    board.innerHTML = `<div class="empty-board">اربط التخزين المشترك من الصندوق بالأعلى أولاً 👆</div>`;
    return;
  }
  try{
    const all = await fetchAllPredictions();
    const entries = Object.values(all.predictions || {});
    if(entries.length === 0){
      board.innerHTML = `<div class="empty-board">لا توجد توقعات محفوظة بعد. كن أول من يتوقع! 🔮</div>`;
      return;
    }
    entries.sort((a,b)=> new Date(b.savedAt) - new Date(a.savedAt));

    let html = `<div class="board-title">👥 ${entries.length} ${entries.length===1?'توقع':'توقعات'} محفوظة</div>`;
    entries.forEach(entry=>{
      const finalPick = entry.picks && entry.picks.final ? entry.picks.final[0] : null;
      const thirdPick = entry.picks && entry.picks.third ? entry.picks.third[0] : null;
      const sfPicks = entry.picks && entry.picks.sf ? entry.picks.sf : [];
      const finalists = sfPicks.filter(p=>p);

      html += `<div class="pred-card">
        <div class="who"><span class="crown">👤</span> ${escapeHtml(entry.name)}</div>`;

      if(finalPick){
        html += `<div class="pred-final">
          <span class="crown">🏆</span> ${flagSpan(finalPick)}<span>${finalPick}</span>
        </div>`;
      } else if(finalists.length){
        html += `<div class="pred-meta">النهائي المتوقع: ${finalists.map(t=>t+" "+flags[t]).join(" 🆚 ")}</div>`;
      } else {
        html += `<div class="pred-meta">لم يكتمل التوقع حتى النهائي بعد</div>`;
      }
      if(thirdPick){
        html += `<div class="pred-meta">🥉 المركز الثالث: ${thirdPick} ${flags[thirdPick]||''}</div>`;
      }
      html += `</div>`;
    });
    board.innerHTML = html;
  }catch(e){
    console.error(e);
    board.innerHTML = `<div class="empty-board">تعذّر تحميل التوقعات. حاول تحديث الصفحة.</div>`;
  }
}

function escapeHtml(str){
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

loadBoard();
</script>
</body>
</html>
